{% extends 'base.html' %}
{% block title %}Delete Vehicle - Vehicle Assist{% endblock %}
{% block content %}
<div class="container py-5 text-center">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm border-0 border-top border-danger border-5">
                <div class="card-body p-5">
                    <i class="fas fa-exclamation-triangle fa-3x text-danger mb-4"></i>
                    <h3 class="fw-bold mb-3">Confirm Deletion</h3>
                    <p class="text-muted mb-4">Are you sure you want to delete your <strong>{{ object.make }} {{ object.model }}</strong>?</p>
                    <form method="POST">
                        {% csrf_token %}
                        <div class="d-flex justify-content-center gap-3">
                            <a href="{% url 'vehicle_list' %}" class="btn btn-outline-secondary px-4">Cancel</a>
                            <button type="submit" class="btn btn-danger px-4">Delete</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
