{% extends 'base.html' %}
{% block title %}{% if object %}Edit Vehicle{% else %}Add Vehicle{% endif %} - Vehicle Assist{% endblock %}
{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-white border-bottom-0 pt-4 pb-0">
                    <h3 class="fw-bold">{% if object %}Edit Vehicle{% else %}Add New Vehicle{% endif %}</h3>
                </div>
                <div class="card-body p-4">
                    <form method="POST">
                        {% csrf_token %}
                        {{ form.as_p }}
                        <div class="d-flex justify-content-end gap-2 mt-4">
                            <a href="{% url 'vehicle_list' %}" class="btn btn-outline-secondary">Cancel</a>
                            <button type="submit" class="btn btn-primary">Save Vehicle</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
